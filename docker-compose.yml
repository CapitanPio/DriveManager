services:
  drive-manager:
    build:
      context: ./drive_manager
    container_name: drive-manager-${ENVIRONMENT:-prod}
    ports:
      - "${DRIVE_MANAGER_PORT:-8081}:8081"
    env_file:
      - ./drive_manager/.env
    restart: unless-stopped
    networks:
      - eras-network

networks:
  eras-network:
    external: false
