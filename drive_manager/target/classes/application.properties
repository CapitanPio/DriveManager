server.port=8081
spring.application.name=drive_manager
spring.config.import=optional:file:drive_manager/.env[.properties],optional:file:.env[.properties]

# MongoDB Configuration
spring.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# Google Drive Configuration
drive.sa.project-id=${DRIVE_SA_PROJECT_ID}
drive.sa.private-key-id=${DRIVE_SA_PRIVATE_KEY_ID}
drive.sa.private-key=${DRIVE_SA_PRIVATE_KEY}
drive.sa.client-email=${DRIVE_SA_CLIENT_EMAIL}
drive.sa.client-id=${DRIVE_SA_CLIENT_ID}
drive.base-folder-id=${DRIVE_BASE_FOLDER_ID}
# Public HTTPS URL Google will POST change notifications to.
# Leave empty for local dev. Set to your real URL (e.g. via Cloudflare Tunnel) when deploying.
drive.webhook-url=${DRIVE_WEBHOOK_URL:}
drive.webhook-token=${DRIVE_WEBHOOK_TOKEN}
ngrok.auth-token=${NGROK_AUTH_TOKEN:}

# Quartz Scheduler Configuration
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.scheduler.instanceName=quartzScheduler
spring.quartz.properties.org.quartz.threadPool.threadCount=10

# Cloudflare R2 Configuration
r2.account-id=${R2_ACCOUNT_ID}
r2.access-key-id=${R2_ACCESS_KEY_ID}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY}
r2.bucket-name=${R2_BUCKET_NAME:drive-cards}
r2.public-url=${R2_PUBLIC_URL}

# Disable multipart parsing — no endpoint uses file uploads, and the
# Drive webhook sends an empty body whose Content-Type would otherwise
# trigger multipart resolution and throw MalformedStreamException.
spring.servlet.multipart.enabled=false

# JWT (shared secret with UsersService)
jwt.secret=${JWT_SECRET}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logging Configuration
logging.level.root=INFO
logging.level.com.drive.drive_manager=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG